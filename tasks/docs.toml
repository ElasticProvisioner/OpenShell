# Documentation build, serve, and check tasks

["docs"]
description = "Build HTML documentation"
run = """
if ! uv run sphinx-build -b html docs _build/docs; then
  echo ""
  echo "Build failed. If this is a dependency issue, try: mise run docs:deps"
  exit 1
fi
echo ""
echo "Documentation built successfully."
echo "file://$(pwd)/_build/docs/index.html"
"""

["docs:deps"]
description = "Install documentation dependencies"
run = "uv sync --group docs"

["docs:build:strict"]
description = "Build HTML documentation with warnings as errors"
depends = ["docs:deps"]
run = "uv run sphinx-build -b html -W --keep-going docs _build/docs"

["docs:serve"]
description = "Serve documentation with live reload on port 8000"
depends = ["docs:deps"]
run = "uv run sphinx-autobuild docs _build/docs --port 8000 --open-browser"

["docs:clean"]
description = "Remove built documentation"
run = "rm -rf _build/docs"

["docs:cli-reference"]
description = "Regenerate CLI reference markdown from source definitions"
run = """
set -e
tmp=$(mktemp)
cargo run --bin openshell -- docs cli-reference > "$tmp"
cp "$tmp" .agents/skills/openshell-cli/cli-reference-generated.md
cp "$tmp" docs/reference/cli-generated.md
rm "$tmp"
echo "CLI reference regenerated:"
echo "  .agents/skills/openshell-cli/cli-reference-generated.md"
echo "  docs/reference/cli-generated.md"
"""

["docs:cli-reference:check"]
description = "Check that CLI reference docs are up to date"
run = """
set -e
tmp=$(mktemp)
trap 'rm -f "$tmp"' EXIT
cargo run --bin openshell -- docs cli-reference > "$tmp"
stale=""
if ! diff -q "$tmp" .agents/skills/openshell-cli/cli-reference-generated.md >/dev/null 2>&1; then
  stale="$stale .agents/skills/openshell-cli/cli-reference-generated.md"
fi
if ! diff -q "$tmp" docs/reference/cli-generated.md >/dev/null 2>&1; then
  stale="$stale docs/reference/cli-generated.md"
fi
if [ -n "$stale" ]; then
  echo "ERROR: CLI reference docs are stale:$stale"
  echo "Run 'mise run docs:cli-reference' to regenerate."
  exit 1
fi
echo "CLI reference docs are up to date."
"""
